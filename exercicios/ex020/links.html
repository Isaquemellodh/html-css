<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>

/* SELETORES PERSONALIZADOS
#  = id
.  = class
:  = pseudo-class
:: = pseudo-element
>  = clildren
*/

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: rgb(255, 0, 0);
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: yellow;
        }

        .especial {
            background-color: rgb(136, 89, 89);
            
        }

        .especial::before {
            content: '⟹';
        }

        
        .especial::after {
            content: '⟸';
            text-decoration: none;
            font-weight: normal;
            color: rgb(85, 145, 88);
        }
    </style>
</head>

<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara/git-github" target="_blank" hel="extenal">Repositório
                GitHub</a></li>
        <li><a href="https://www.youtube.com/c/CursoemV%C3%ADdeo" target="_blank" hel="extenal" class="especial">Canal
                do Youtube</a>
        </li>
        <li><a href="https://www.cursoemvideo.com/" target="_blank" hel="extenal" class="especial">Site do CursoemVideo</a></li>
    </ul>
</body>

</html>
