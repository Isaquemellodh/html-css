<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abri esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imgens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imgens/foto-m.png" type="image/png">
        <img src="imgens/foto-g.png" alt="Imagem flexivel">
    </picture>
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir audio em HTML5.</p>
    <audio preload="metadata" controls loop>
      <source src="midia/o-meu-querer-clipe-oficial.mp3" type="audio/mpeg">
      <source src="midia/o-meu-querer-clipe-oficial.ogg" type="audio/ogg">
      <source src="midia/o-meu-querer-clipe-oficial.wav" type="audio/wav">
    </audio>
    <p>Infelismente seu navegador não consegue reproduzir áudio. <a href="midia/o-meu-querer-clipe-oficial.mp3" download="">cliquei aqui para baixar o arquivo</a></p>  
    <!--MP3 WAV OGG-->
</body>
</html>
