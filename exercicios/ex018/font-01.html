<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com Google Fotes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Workbench:BLED,SCAN@0..100,-53..100&display=swap');
        
        @import url('https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');


        body {
            font-family: Work Sans, Helvetica, sans-serif;
            font-size: 16px;
            color: black;
        }

        h1 {
            font-family:  Kaushan Script, Times, serif;
        }

        h2{
            font-family: workbench;
            font-size: 1cm;
            font-weight: lighter;
        }
    </style>
</head>

<body>
    <h1>Título</h1>
    <h2>Isaque</h2>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Rem impedit vero ipsam, aperiam adipisci magnam
        nesciunt at ea non commodi, atque quis corporis consequuntur, placeat dignissimos ut unde repudiandae incidunt!
    </p>
</body>

</html>
