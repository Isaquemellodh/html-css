<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>

<body>
    <h1>Inserindo vídeos hospedados localmente<h1>
            <p>Este vídeo está hospedado no meu proprio servidor</p>
            <video width="500" controls poster="imagens/road.jpeg.jpg">
                <source src="midia/Meu-video.ogv.ogv" type="video/ogv">
                <source src="midia/meu-video.mp4.mp4" type="video/mp4">
                <source src="midia/meu-video.m4v.mp4" type="video/mp4">
                <source src="midia/Meu-video.webm.webm" type="video/webm">
                <p>Seu navegador não tem compatibilidade com reprodução de vídeo</p>
            </video>
            <h1>Inserindo video do youtube</h1>
            <p>photoshop imagem com bordas personalizadas
            </p>
            <iframe width="500" height="315" src="https://www.youtube.com/embed/MzHuP9rDQVI?si=ViFyYj0yg2gw_ma6" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <p>O que é música?
            </p>
            <iframe width="500" height="315" src="https://www.youtube.com/embed/5ecnAwhhFQ8?si=R9vAe1Fa6Tg4IS8P" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <h1>Inserindo video do vimeo</h1>
            <iframe src="https://player.vimeo.com/video/152301072?h=c265223eae&color=c9ff23&portrait=0" width="500" height="281" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
</body>

</html>
